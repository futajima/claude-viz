<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 510" role="img">
  <title>耳かきGOI化 アレンジ案</title>
  <desc>てこ式操作（支点＝入口、手と先端が逆に動く）と、事故で入口へ弾き出される進行ロスト構造</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="380" height="510" fill="#ffffff"/>
  <text x="190" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">耳かきGOI化 アレンジ案</text>

  <text x="40" y="62" font-family="sans-serif" font-size="12" fill="#888888">① てこ式操作（支点＝耳の入口）</text>

  <text x="70" y="88" font-family="sans-serif" font-size="12" fill="#555555">奥ほど大きく振れる</text>
  <line x1="250" y1="95" x2="40" y2="125" stroke="#b98a6e" stroke-width="2"/>
  <line x1="250" y1="205" x2="40" y2="172" stroke="#b98a6e" stroke-width="2"/>

  <line x1="345" y1="132" x2="120" y2="175" stroke="#7a5c28" stroke-width="3" stroke-linecap="round"/>
  <circle cx="345" cy="132" r="5" fill="#d9b36c" stroke="#7a5c28" stroke-width="1"/>
  <circle cx="120" cy="175" r="4" fill="#e8c785" stroke="#7a5c28" stroke-width="1"/>
  <polygon points="250,152 242,166 258,166" fill="#8a8a8a"/>
  <text x="250" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666666">支点</text>

  <line x1="330" y1="128" x2="330" y2="100" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="330" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">手を上げる</text>
  <line x1="110" y1="190" x2="110" y2="218" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="110" y="234" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c62828">先端は逆に動く</text>

  <text x="40" y="262" font-family="sans-serif" font-size="12" fill="#888888">② 進行ロスト構造（タイマー廃止）</text>

  <rect x="40" y="272" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="293" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">奥へ進む</text>
  <text x="190" y="313" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">最深部に「主」耳垢</text>
  <line x1="190" y1="328" x2="190" y2="344" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="348" width="300" height="52" rx="8" fill="#fdecea" stroke="#d9534f" stroke-width="1"/>
  <text x="190" y="369" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b71c1c">爆音事故</text>
  <text x="190" y="389" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a94442">持ち主がビクッとする</text>
  <line x1="190" y1="404" x2="190" y2="420" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="424" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="445" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">入口へ弾き出される</text>
  <text x="190" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">位置ロスト・除去は維持</text>

  <path d="M345,450 L362,450 L362,298 L345,298" fill="none" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
