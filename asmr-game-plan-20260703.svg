<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 580" role="img">
  <title>ASMR失敗ゲーム企画マップ</title>
  <desc>コアループ（難しい操作が成功すると小さな音でスコア、失敗すると爆音で笑い）と、進め方4フェーズのロードマップ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="380" height="580" fill="#ffffff"/>
  <text x="190" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">ASMR失敗ゲーム 企画マップ</text>

  <text x="40" y="62" font-family="sans-serif" font-size="12" fill="#888888">コアループ</text>
  <rect x="40" y="72" width="300" height="56" rx="8" fill="#e8eef8" stroke="#6b8fc9" stroke-width="1"/>
  <text x="190" y="95" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a3a6b">難しすぎる操作</text>
  <text x="190" y="115" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a5f85">QWOP式・物理演算でわざと難しく</text>

  <line x1="120" y1="130" x2="112" y2="154" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="130" x2="268" y2="154" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="30" y="160" width="150" height="64" rx="8" fill="#e6f4ea" stroke="#4c9a5f" stroke-width="1"/>
  <text x="105" y="186" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1b5e20">こそばゆい音</text>
  <text x="105" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#33691e">スコア＝リスナー増</text>

  <rect x="200" y="160" width="150" height="64" rx="8" fill="#fdecea" stroke="#d9534f" stroke-width="1"/>
  <text x="275" y="186" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b71c1c">爆音が鳴る！</text>
  <text x="275" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a94442">笑いどころ＝撮れ高</text>

  <text x="40" y="262" font-family="sans-serif" font-size="12" fill="#888888">進め方（おすすめ）</text>

  <rect x="40" y="272" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="293" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">① 検証プロト</text>
  <text x="190" y="313" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">耳かき1本だけ・ブラウザで</text>
  <line x1="190" y1="328" x2="190" y2="344" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="348" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="369" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">② クリップテスト</text>
  <text x="190" y="389" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">30秒動画で笑えるか</text>
  <line x1="190" y1="404" x2="190" y2="420" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="424" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="445" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">③ 拡張</text>
  <text x="190" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">ステージ・スコア・ランキング</text>
  <line x1="190" y1="480" x2="190" y2="496" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="500" width="300" height="52" rx="8" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="190" y="521" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">④ 配信で配布</text>
  <text x="190" y="541" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555555">itch.io等・配信許諾を明記</text>
</svg>
