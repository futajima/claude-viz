<svg viewBox="0 0 720 1080" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif" role="img">
<title>茂原 vs 八積 土地比較スコアカード</title>
<desc>9軸重み付けスコアで八積51.5、茂原36.0。八積が優位。</desc>
<rect x="0" y="0" width="720" height="1080" fill="#FFFFFF"/>

<text x="36" y="48" font-size="26" font-weight="500" fill="#111827">新築用地スコアカード</text>
<text x="36" y="74" font-size="14" fill="#6B7280">茂原（高師/茂原1554-11） vs 八積（長生村岩沼） ・ 重み付け9軸評価</text>

<!-- verdict banner -->
<rect x="36" y="96" width="648" height="92" rx="12" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
<text x="56" y="130" font-size="15" fill="#0F766E" font-weight="500">結論</text>
<text x="56" y="160" font-size="22" font-weight="500" fill="#0F766E">八積を買うべき</text>
<text x="56" y="180" font-size="13" fill="#475569">消えない差は災害リスク。繰り返し浸水する街で“浸水ゾーン”を引く理由が弱い。</text>
<rect x="470" y="112" width="96" height="60" rx="8" fill="#0F766E"/>
<text x="518" y="138" font-size="13" fill="#CCFBF1" text-anchor="middle">八積</text>
<text x="518" y="162" font-size="22" font-weight="500" fill="#FFFFFF" text-anchor="middle">51.5</text>
<rect x="576" y="112" width="96" height="60" rx="8" fill="#FEE2E2"/>
<text x="624" y="138" font-size="13" fill="#B91C1C" text-anchor="middle">茂原</text>
<text x="624" y="162" font-size="22" font-weight="500" fill="#B91C1C" text-anchor="middle">36.0</text>

<!-- hazard strip -->
<text x="36" y="226" font-size="16" font-weight="500" fill="#111827">災害リスク（重ねるハザードマップ・ピンポイント判定）</text>
<rect x="36" y="240" width="316" height="120" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
<text x="52" y="266" font-size="14" font-weight="500" fill="#B91C1C">茂原物件</text>
<text x="52" y="290" font-size="12.5" fill="#7F1D1D">洪水: 想定最大規模 0.5m未満 浸水ゾーン内</text>
<text x="52" y="310" font-size="12.5" fill="#7F1D1D">（薄黄 #F7F5A9・周辺25/25が該当＝境界外でなく内側）</text>
<text x="52" y="330" font-size="12.5" fill="#7F1D1D">2019/2023 実績浸水・地盤沈下・市街地内水リスク</text>
<text x="52" y="350" font-size="12.5" fill="#991B1B">津波/高潮/土砂: 区域外</text>

<rect x="368" y="240" width="316" height="120" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
<text x="384" y="266" font-size="14" font-weight="500" fill="#15803D">八積物件</text>
<text x="384" y="290" font-size="12.5" fill="#166534">洪水: 区域外（タイル該当なし）</text>
<text x="384" y="310" font-size="12.5" fill="#166534">津波・高潮・内水・土砂: すべて区域外</text>
<text x="384" y="330" font-size="12.5" fill="#166534">海岸から約4-5km内陸／全レイヤー該当なし</text>
<text x="384" y="350" font-size="12.5" fill="#15803D">※液状化のみ要実地盤調査（砂地）</text>

