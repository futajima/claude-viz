<text x="36" y="846" fill="#6B7280">土地面積</text>
<text x="280" y="846" fill="#374151">298m² / 90.1坪</text>
<text x="500" y="846" fill="#374151">319m² / 96.5坪</text>

<text x="36" y="872" fill="#6B7280">駅徒歩</text>
