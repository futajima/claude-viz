<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 560" role="img">
  <title>体験ブレイクスルーの手立てマップ</title>
  <desc>触る・混ぜる・盗むの3系統9つの手立てと、一推しのマイク入力案</desc>
  <rect x="0" y="0" width="380" height="560" fill="#ffffff"/>
  <text x="190" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">ブレイクスルーの手立てマップ</text>
  <text x="190" y="52" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">原則：考える回数より、触る回数</text>

  <rect x="24" y="66" width="332" height="110" rx="8" fill="#f5f5f5" stroke="#bbbbbb"/>
  <text x="36" y="88" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">A. 触る（試行回数の暴力）</text>
  <text x="36" y="110" font-family="sans-serif" font-size="11" fill="#555555">① おもちゃジャム：1日3〜5本量産</text>
  <text x="36" y="130" font-family="sans-serif" font-size="11" fill="#555555">② 極端化スライダー：増幅10倍・遅延0.5秒</text>
  <text x="36" y="150" font-family="sans-serif" font-size="11" fill="#555555">③ 既存ゲームに「叫んだら終了」ルール</text>
  <text x="36" y="168" font-family="sans-serif" font-size="10" fill="#888888">評価基準は1つだけ：「声が出たか」</text>

  <rect x="24" y="188" width="332" height="92" rx="8" fill="#f5f5f5" stroke="#bbbbbb"/>
  <text x="36" y="210" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">B. 混ぜる（強制的な組み合わせ）</text>
  <text x="36" y="232" font-family="sans-serif" font-size="11" fill="#555555">④ 制約カード：部品×入力×シチュを乱択</text>
  <text x="36" y="252" font-family="sans-serif" font-size="11" fill="#555555">⑤ 入力デバイスを疑う：ジャイロ・ペン・声</text>
  <text x="36" y="272" font-family="sans-serif" font-size="11" fill="#555555">⑥ 「静かにしないといけない◯◯」50本ノック</text>

  <rect x="24" y="292" width="332" height="92" rx="8" fill="#f5f5f5" stroke="#bbbbbb"/>
  <text x="36" y="314" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1a1a">C. 盗む（現実から採集）</text>
  <text x="36" y="336" font-family="sans-serif" font-size="11" fill="#555555">⑦ 実物フィールドワーク：本物の耳かき＋録音</text>
  <text x="36" y="356" font-family="sans-serif" font-size="11" fill="#555555">⑧ ASMR配信の「事故」アーカイブ採集</text>
  <text x="36" y="376" font-family="sans-serif" font-size="11" fill="#555555">⑨ 実況しながら自分でプレイ（一人二役）</text>

  <rect x="24" y="400" width="332" height="136" rx="8" fill="#fdf3e3" stroke="#c9962e" stroke-width="1.5"/>
  <text x="36" y="424" font-family="sans-serif" font-size="13" font-weight="700" fill="#8a5f10">★ 一推し：マイク入力</text>
  <text x="36" y="448" font-family="sans-serif" font-size="12" font-weight="600" fill="#6b4a0e">「このゲームは、あなたの声を聞いている」</text>
  <text x="36" y="472" font-family="sans-serif" font-size="11" fill="#7a5c20">失敗 → 爆音 → 思わず叫ぶ →</text>
  <text x="36" y="492" font-family="sans-serif" font-size="11" fill="#7a5c20">叫び声でさらに失敗（無限ループの喜劇）</text>
  <text x="36" y="516" font-family="sans-serif" font-size="11" fill="#7a5c20">ブラウザの音量検出だけで実装可・即試せる</text>
</svg>
